# MythicPrefixes Made by @PQguanfang
#
# Read the wiki here: mythicprefixes.superiormc.cn

debug: false

config-files:
  language: en_US
  # PREMIUM version only.
  per-player-language: true
  force-parse-mini-message: true

cache:
  # If you are facing issue when plugin load cache, try set this option to JOIN.
  load-mode: LOGIN
  # Bypass condition check when player still joining the server.
  bypass-condition-when-loading: true
  # Cache remove will delay 3 seconds after player left the server, set -1 to disable.
  remove-delay: -1

# {status} Placeholder
status-placeholder:
  unlocked: '{lang}'
  using: '{lang}'
  locked: '{lang}'
  max-reached: '{lang}'

circle-actions:
  # Default cycle period for prefixes without their own circle-actions.period-tick.
  period-tick: 20

dynamic-prefix:
  # Prefix config option `dynamic-prefix: true` allows players to edit this prefix value.
  # Java players right click the prefix item in GUI, Bedrock players edit through FormUI.
  min-length: 1
  max-length: 32
  sensitive-words: []

max-prefixes-amount:
  default:
    default: 1
    vip: 2
  # Group ID
  # chat:
  #   default: 1
  #   vip: 1

max-prefixes-amount-conditions:
  vip:
    1:
      type: permission
      permission: 'group.vip'

choose-prefix-gui:
  # You can use {max} to display max page amount, {now} to display now page amount. Require enable title update to
  # update those placeholder after open GUI.
  title: '{lang}'
  bedrock-title: '{lang}'
  # PREMIUM version only, if enabled, can update dynamic value used in GUI title.
  title-update:
    # Require packetevents and MythicChanger.
    enabled: false
    resend-items-pack: false
  size: 54
  forbid-click-outside: false
  anti-dupe-checker: false
  auto-translate-item-name: true
  prefix-item-slot: [10,11,12,13,14,15,16,
                     19,20,21,22,23,24,25,
                     28,29,30,31,32,33,34]
  # Premium version only
  bedrock:
    enabled: true
    # Support value: FLOODGATE, UUID
    check-method: FLOODGATE
  # Premium version only
  filter-item:
    # Set to -1 to hide.
    slot: 47
    material: HOPPER
    name: '{lang:filter-item-name}'
    bedrock-name: '{lang:filter-item-name2}'
    lore:
      - '{lang:filter-item-lore}'
      - '{lang:filter-item-click}'
    placeholder:
      all: '{lang:filter-all}'
      using: '{lang:filter-using}'
      can-use: '{lang:filter-can-use}'
  next-page-item:
    slot: 53
    material: ARROW
    name: '{lang:next-item-name}'
    lore:
      - '{lang:next-item-lore-1}'
      - '{lang:next-item-lore-2}'
  previous-page-item:
    slot: 45
    material: ARROW
    name: '{lang:previous-item-name}'
    lore:
      - '{lang:previous-item-lore-1}'
      - '{lang:previous-item-lore-2}'
  custom-item:
    0:
      material: BROWN_STAINED_GLASS_PANE
      name: ' '
    1:
      material: ORANGE_STAINED_GLASS_PANE
      name: ' '
    2:
      material: BROWN_STAINED_GLASS_PANE
      name: ' '
