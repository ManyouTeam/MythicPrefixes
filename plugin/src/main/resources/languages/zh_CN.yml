# 所有消息也支持多行，就像这样！
help:
  main: |
    &#98FB98&lMythicPrefixes &7作者 @PQguanfang
    &f/mythicprefixes help &7- 查看帮助。
    &f/mythicprefixes opengui &7- 打开称号 GUI。
    &f/mythicprefixes viewusingprefix &7- 查看你正在使用的称号。
  main-admin: |
    &#98FB98&lMythicPrefixes &7作者 @PQguanfang
    &f/mythicprefixes help &7- 查看帮助。
    &f/mythicprefixes opengui &7- 打开称号 GUI。
    &f/mythicprefixes opengui <player> &7- 为指定玩家打开称号 GUI。
    &f/mythicprefixes viewusingprefix &7- 查看你正在使用的称号。
    &f/mythicprefixes viewusingprefix <player> &7- 查看指定玩家正在使用的称号。
    &f/mythicprefixes addprefix <prefix> &7- 为自己添加新称号。
    &f/mythicprefixes addprefix <player> <prefix> &7- 为指定玩家添加新称号。
    &f/mythicprefixes removeprefix <prefix> &7- 移除自己正在使用的称号。
    &f/mythicprefixes removeprefix <player> <prefix> &7- 移除指定玩家正在使用的称号。
    &f/mythicprefixes setprefix <prefixes> &7- 将你正在使用的称号设置为指定值。支持使用 ;; 分隔每个称号。
    &f/mythicprefixes setprefix <player> <prefixes> &7- 将指定玩家正在使用的称号设置为指定值。支持使用 ;; 分隔每个称号。
    &f/mythicprefixes parseplaceholder <placeholder> &7- 解析显示占位符。
    &f/mythicprefixes dynamicprefix list &7- 列出待审核的动态称号申请。
    &f/mythicprefixes dynamicprefix approve <uuid> <prefix> &7- 通过一个动态称号申请。
    &f/mythicprefixes dynamicprefix deny <uuid> <prefix> &7- 拒绝一个动态称号申请。
  main-console: |
    &#98FB98&lMythicPrefixes &7作者 @PQguanfang
    &f/mythicprefixes help &7- 查看帮助。
    &f/mythicprefixes opengui <player> &7- 为指定玩家打开称号 GUI。
    &f/mythicprefixes viewusingprefix <player> &7- 查看指定玩家正在使用的称号。
    &f/mythicprefixes addprefix <player> <prefix> &7- 为指定玩家添加新称号。
    &f/mythicprefixes removeprefix <player> <prefix> &7- 移除指定玩家正在使用的称号。
    &f/mythicprefixes setprefix <player> <prefixes> &7- 将指定玩家正在使用的称号设置为指定值。支持使用 ;; 分隔每个称号。
    &f/mythicprefixes dynamicprefix list &7- 列出待审核的动态称号申请。
    &f/mythicprefixes dynamicprefix approve <uuid> <prefix> &7- 通过一个动态称号申请。
    &f/mythicprefixes dynamicprefix deny <uuid> <prefix> &7- 拒绝一个动态称号申请。

